<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passkey + Biometria (localhost)</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Passkey + Biometria</h1>
      <p class="subtitle">
        Registo e login com passkey em <code>localhost</code>. Registo bloqueado para
        1 passkey por utilizador e apenas via dispositivo movel (fluxo QR/Bluetooth).
      </p>

      <section class="card">
        <label for="username">Utilizador</label>
        <input id="username" type="text" autocomplete="username webauthn" />

        <div class="actions">
          <button id="registerBtn" type="button">Registar passkey movel</button>
          <button id="loginBtn" type="button">Entrar com passkey</button>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </section>

      <section class="card">
        <h2>Estado</h2>
        <p id="support"></p>
        <p id="session"></p>
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
